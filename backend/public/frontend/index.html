<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2ecc71" />
  <meta name="description" content="TaskFlow - Offline-first task tracking PWA" />
  <title>TaskFlow</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/frontend/manifest.json" />
  <link rel="apple-touch-icon" href="/frontend/icons/icon-192.svg" />

  <!-- Bootstrap 4.5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <!-- Custom styles -->
  <link rel="stylesheet" href="/frontend/style.css" />
</head>
<body>

<div id="app">
  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ── Sidebar ── -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <i class="fas fa-check-double"></i> TaskFlow
      </div>
    </div>

    <div class="py-2">
      <div class="nav-section">Menu</div>
      <button class="nav-item active" data-view="today" onclick="App.setView('today')">
        <i class="fas fa-sun fa-fw"></i> Hôm nay
        <span class="badge-count" id="badge-today">0</span>
      </button>
      <button class="nav-item" data-view="upcoming" onclick="App.setView('upcoming')">
        <i class="fas fa-calendar-alt fa-fw"></i> Sắp tới
        <span class="badge-count" id="badge-upcoming">0</span>
      </button>
      <button class="nav-item" data-view="all" onclick="App.setView('all')">
        <i class="fas fa-tasks fa-fw"></i> Tất cả
      </button>
      <button class="nav-item" data-view="kanban" onclick="App.setView('kanban')">
        <i class="fas fa-columns fa-fw"></i> Dashboard
      </button>

      <div class="nav-section mt-2">Dự án</div>
      <div id="project-nav-list"></div>
      <button class="nav-item" onclick="App.openProjectModal()">
        <i class="fas fa-plus fa-fw"></i> Thêm dự án
      </button>
    </div>

    <div class="sidebar-footer">
      <button class="nav-item w-100" id="btn-notify" onclick="App.requestNotificationPermission()">
        <i class="fas fa-bell fa-fw"></i> Bật thông báo
      </button>
      <div id="pwa-install-wrap" style="display:none">
        <button class="nav-item w-100" id="btn-install" onclick="App.installPWA()">
          <i class="fas fa-download fa-fw"></i> Cài đặt App
        </button>
      </div>
    </div>
  </nav>

  <!-- ── Main ── -->
  <div id="main">
    <!-- Topbar -->
    <div id="topbar">
      <button id="sidebar-toggle" class="btn btn-sm" style="background:none;border:none;color:var(--text-primary)" onclick="App.toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <h5 id="view-title">Hôm nay</h5>
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Tìm kiếm task..." oninput="App.onSearch(this.value)" />
      </div>
      <span id="offline-badge"><i class="fas fa-wifi-slash mr-1"></i>Offline</span>
      <span id="sync-badge" style="display:none;background:var(--warning);color:white;font-size:.75rem;padding:3px 10px;border-radius:20px">
        <i class="fas fa-sync-alt fa-spin mr-1"></i>Đang sync...
      </span>
      <span id="user-info" style="font-size:.82rem;color:var(--text-muted);margin-left:auto;white-space:nowrap"></span>
    </div>

    <!-- Content -->
    <div id="content">
      <!-- Stats -->
      <div class="row mb-4" id="stats-row">
        <div class="col-6 col-md-3 mb-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:#e8f8f0">
              <i class="fas fa-tasks" style="color:#27ae60"></i>
            </div>
            <div>
              <div class="stat-value" id="stat-total">0</div>
              <div class="stat-label">Tổng task</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3 mb-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:#fef9e7">
              <i class="fas fa-spinner" style="color:#d68910"></i>
            </div>
            <div>
              <div class="stat-value" id="stat-inprogress">0</div>
              <div class="stat-label">Đang làm</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3 mb-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:#d5f5e3">
              <i class="fas fa-check-circle" style="color:#1e8449"></i>
            </div>
            <div>
              <div class="stat-value" id="stat-done">0</div>
              <div class="stat-label">Hoàn thành</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3 mb-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:#fdf0ed">
              <i class="fas fa-exclamation-circle" style="color:#e74c3c"></i>
            </div>
            <div>
              <div class="stat-value" id="stat-overdue">0</div>
              <div class="stat-label">Quá hạn</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="App.setFilter('all', this)">Tất cả</button>
        <button class="filter-btn" data-filter="todo" onclick="App.setFilter('todo', this)">Cần làm</button>
        <button class="filter-btn" data-filter="in_progress" onclick="App.setFilter('in_progress', this)">Đang làm</button>
        <button class="filter-btn" data-filter="done" onclick="App.setFilter('done', this)">Xong</button>
        <button class="filter-btn" data-filter="high" onclick="App.setFilter('high', this)">
          <i class="fas fa-fire mr-1" style="color:#ef4444"></i>Ưu tiên cao
        </button>
      </div>

      <!-- Quick add -->
      <div class="quick-add" onclick="App.openTaskModal()">
        <i class="fas fa-plus-circle"></i>
        <span>Thêm task mới...</span>
      </div>

      <!-- Task list / Dashboard -->
      <div id="task-list-view">
        <div id="task-list"></div>
      </div>
      <div id="kanban-view" style="display:none">
        <div class="row">
          <div class="col-md-4 mb-3">
            <div class="kanban-col">
              <div class="kanban-col-header">
                <span class="kanban-dot" style="background:#95a5a6"></span> Cần làm
                <span class="badge-count ml-auto" id="k-todo-count">0</span>
              </div>
              <div id="k-todo"></div>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <div class="kanban-col">
              <div class="kanban-col-header">
                <span class="kanban-dot" style="background:#f39c12"></span> Đang làm
                <span class="badge-count ml-auto" id="k-inprogress-count">0</span>
              </div>
              <div id="k-inprogress"></div>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <div class="kanban-col">
              <div class="kanban-col-header">
                <span class="kanban-dot" style="background:#27ae60"></span> Hoàn thành
                <span class="badge-count ml-auto" id="k-done-count">0</span>
              </div>
              <div id="k-done"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div id="toast-container"></div>

<!-- ── Task Modal ── -->
<div class="modal fade" id="taskModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="taskModalTitle">Thêm Task</h5>
        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="task-id" />
        <div class="form-group">
          <label>Tiêu đề *</label>
          <input type="text" class="form-control" id="task-title" placeholder="Nhập tiêu đề task..." />
        </div>
        <div class="form-group">
          <label>Mô tả</label>
          <textarea class="form-control" id="task-desc" rows="3" placeholder="Mô tả chi tiết..."></textarea>
        </div>
        <div class="row">
          <div class="col-6">
            <div class="form-group">
              <label>Ưu tiên</label>
              <select class="form-control" id="task-priority">
                <option value="low">Thấp</option>
                <option value="medium" selected>Trung bình</option>
                <option value="high">Cao</option>
              </select>
            </div>
          </div>
          <div class="col-6">
            <div class="form-group">
              <label>Trạng thái</label>
              <select class="form-control" id="task-status">
                <option value="todo">Cần làm</option>
                <option value="in_progress">Đang làm</option>
                <option value="done">Hoàn thành</option>
              </select>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-6">
            <div class="form-group">
              <label>Hạn chót</label>
              <input type="datetime-local" class="form-control" id="task-due" />
            </div>
          </div>
          <div class="col-6">
            <div class="form-group">
              <label>Dự án</label>
              <select class="form-control" id="task-project">
                <option value="">-- Không có --</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <button type="button" class="btn btn-danger-custom" id="btn-delete-task" style="display:none" onclick="App.deleteTask()">
          <i class="fas fa-trash mr-1"></i>Xóa
        </button>
        <div class="ml-auto">
          <button type="button" class="btn btn-secondary mr-2" data-dismiss="modal">Hủy</button>
          <button type="button" class="btn btn-primary-custom" onclick="App.saveTask()">
            <i class="fas fa-save mr-1"></i>Lưu
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Project Modal ── -->
<div class="modal fade" id="projectModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Thêm Dự Án</h5>
        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Tên dự án *</label>
          <input type="text" class="form-control" id="project-name" placeholder="Tên dự án..." />
        </div>
        <div class="form-group">
          <label>Màu sắc</label>
          <input type="color" class="form-control" id="project-color" value="#6366f1" style="height:40px;padding:4px" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Hủy</button>
        <button type="button" class="btn btn-primary-custom" onclick="App.saveProject()">Tạo</button>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/frontend/app.js"></script>
</body>
</html>
